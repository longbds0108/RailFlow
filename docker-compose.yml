name: railflow

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: railflow-backend
    container_name: railflow-backend
    env_file: .env
    environment:
      PORT: 4000
    ports:
      - "4000:4000"
    volumes:
      # live-read deployed.json (re-deploy updates it without rebuild)
      - ./config:/app/config:ro
      # persist SQLite across restarts
      - backend-data:/app/backend/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # NEXT_PUBLIC_* come from the root .env (compose auto-interpolates it)
        NEXT_PUBLIC_ARC_CHAIN_ID: ${NEXT_PUBLIC_ARC_CHAIN_ID}
        NEXT_PUBLIC_ARC_RPC_URL: ${NEXT_PUBLIC_ARC_RPC_URL}
        NEXT_PUBLIC_ARC_EXPLORER_URL: ${NEXT_PUBLIC_ARC_EXPLORER_URL}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
        NEXT_PUBLIC_KIT_KEY: ${NEXT_PUBLIC_KIT_KEY}
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE}
        NEXT_PUBLIC_PAYMENT_RECEIVER: ${NEXT_PUBLIC_PAYMENT_RECEIVER}
    image: railflow-frontend
    container_name: railflow-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
