name: arcflow

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: arcflow-backend
    container_name: arcflow-backend
    env_file: .env
    environment:
      PORT: 4000
    ports:
      - "4000:4000"
    volumes:
      # live-read deployed.json (re-deploy updates it without rebuild)
      - ./config:/app/config:ro
      # persist SQLite across restarts
      - backend-data:/app/backend/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # NEXT_PUBLIC_* come from the root .env (compose auto-interpolates it)
        NEXT_PUBLIC_ARC_CHAIN_ID: ${NEXT_PUBLIC_ARC_CHAIN_ID}
        NEXT_PUBLIC_ARC_RPC_URL: ${NEXT_PUBLIC_ARC_RPC_URL}
        NEXT_PUBLIC_ARC_EXPLORER_URL: ${NEXT_PUBLIC_ARC_EXPLORER_URL}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
        NEXT_PUBLIC_KIT_KEY: ${NEXT_PUBLIC_KIT_KEY}
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE}
        NEXT_PUBLIC_PAYMENT_RECEIVER: ${NEXT_PUBLIC_PAYMENT_RECEIVER}
    image: arcflow-frontend
    container_name: arcflow-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:2026.6.0
    container_name: arcflow-tunnel
    command: tunnel --config /etc/cloudflared/config.yml run arcflow
    volumes:
      - ./deploy/cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      # tunnel credentials (created on the host by `cloudflared tunnel login` + setup)
      - ${HOME}/.cloudflared/15ba4a4d-08be-44cb-833f-79c01f1961d2.json:/etc/cloudflared/creds.json:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  backend-data:
